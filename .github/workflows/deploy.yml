name: Deploy Server

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-server
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/top-robbers/server
  IMAGE_TAG: production
  SERVER_PATH: /opt/top-robbers/server

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            OPENMP_SERVER_URL=${{ vars.OPENMP_SERVER_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare VPS directory
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p ${{ env.SERVER_PATH }}/logs ${{ env.SERVER_PATH }}/data ${{ env.SERVER_PATH }}/gamemodes"

      - name: Upload production compose file
        run: |
          scp -i ~/.ssh/id_ed25519 compose.production.yml \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.SERVER_PATH }}/compose.production.yml"

      - name: Login VPS to GHCR
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          printf '%s' "$GHCR_READ_TOKEN" | ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "docker login ghcr.io -u '${{ vars.GHCR_USERNAME }}' --password-stdin"

      - name: Pull and restart server
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd ${{ env.SERVER_PATH }} \
            && docker compose -f compose.production.yml pull \
            && docker compose -f compose.production.yml up -d --remove-orphans \
            && docker image prune -f"